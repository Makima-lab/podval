<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Подвал Макимы — Движок Госпожи</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0809; --panel:#141013; --panel2:#1c161b; --line:#2e2630;
    --blood:#c8102e; --bloodDk:#7a0a1c; --gold:#d4af37; --goldLt:#f0d878; --goldDk:#8c7320;
    --violet:#8a4ad9; --text:#efe9f0; --dim:#a99fb0; --faint:#6e6470; --good:#46c98a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#0a0809;color:var(--text);font-family:'Manrope',system-ui,sans-serif;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(200,16,46,.10),transparent 55%),radial-gradient(ellipse at 50% 120%,rgba(212,175,55,.06),transparent 50%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1}
  @keyframes glow{0%,100%{box-shadow:0 0 0 rgba(212,175,55,0)}50%{box-shadow:0 0 26px rgba(212,175,55,.28)}}
  @keyframes bloodGlow{0%,100%{box-shadow:0 0 0 rgba(200,16,46,0)}50%{box-shadow:0 0 26px rgba(200,16,46,.4)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .tapbtn:active{transform:scale(.95)}
  ::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0a0809,#0a0809ee 70%,transparent);backdrop-filter:blur(6px);padding:14px 16px 0;border-bottom:1px solid transparent;border-image:linear-gradient(90deg,transparent,var(--goldDk),transparent) 1}
  .brandrow{display:flex;align-items:center;gap:12px}
  .crest{width:46px;height:46px;border-radius:50%;border:2px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:'Cinzel';font-weight:900;font-size:20px;background:radial-gradient(circle at 50% 30%,rgba(212,175,55,.18),transparent);animation:glow 4s infinite}
  .brandname{font-family:'Cinzel';font-size:21px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,var(--goldLt),var(--gold),var(--goldDk),var(--gold),var(--goldLt));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s linear infinite}
  .brandsub{font-size:10px;color:var(--faint);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
  nav{display:flex;gap:3px;margin-top:12px;overflow-x:auto}
  nav button{flex:0 0 auto;background:transparent;color:var(--dim);border:1px solid var(--line);border-bottom:none;border-radius:9px 9px 0 0;padding:9px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'Manrope';letter-spacing:.3px;transition:.15s}
  nav button.on{background:linear-gradient(180deg,var(--panel2),var(--panel));color:var(--gold);border-color:var(--goldDk)}
  main{padding:16px;max-width:780px;margin:0 auto;animation:fadeUp .4s}
  .card{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
  .card.gilded{border-color:var(--goldDk);box-shadow:inset 0 0 0 1px rgba(212,175,55,.08)}
  .corner::before,.corner::after{content:"";position:absolute;width:12px;height:12px;border-color:var(--gold);opacity:.5}
  .corner::before{top:6px;left:6px;border-top:1.5px solid;border-left:1.5px solid}
  .corner::after{bottom:6px;right:6px;border-bottom:1.5px solid;border-right:1.5px solid}
  .btn{background:linear-gradient(180deg,var(--blood),var(--bloodDk));color:#fff;border:none;border-radius:9px;padding:11px 17px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Manrope';letter-spacing:.3px}
  .btn.gold{background:linear-gradient(180deg,var(--goldLt),var(--gold));color:#2a1f06}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim)}
  .btn.sm{padding:8px 12px;font-size:12.5px}
  input,select{width:100%;background:var(--void);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:14px;outline:none;font-family:'Manrope'}
  input:focus,select:focus{border-color:var(--gold)}
  .tag{display:inline-block;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;margin:2px}
  .banner{margin-bottom:12px;border-left:3px solid;border-image:linear-gradient(180deg,var(--gold),var(--bloodDk)) 1;padding-left:13px}
  .banner h1{margin:0;font-family:'Cinzel';font-size:23px;font-weight:900;letter-spacing:1.5px}
  .banner .s{font-size:12px;color:var(--dim);margin-top:3px;font-style:italic}
  .stat{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:13px;padding:15px 8px;text-align:center;overflow:hidden}
  .stat .v{font-family:'Cinzel';font-size:27px;font-weight:900}
  .stat .l{font-size:9.5px;color:var(--faint);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
  .sect{font-family:'Cinzel';font-size:13px;color:var(--gold);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .sect::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--goldDk),transparent)}
  .lbl{font-size:11px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
  .muted{color:var(--faint);font-size:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .alert{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,rgba(200,16,46,.14),transparent);border:1px solid var(--bloodDk);border-radius:11px;padding:10px 13px;margin-bottom:11px;font-size:12.5px;color:#f0c0c8;animation:bloodGlow 3s infinite}
  .alert .dot{width:8px;height:8px;border-radius:50%;background:var(--blood);box-shadow:0 0 8px var(--blood);flex:0 0 auto}
  .countdown{background:rgba(212,175,55,.1);border:1px solid var(--goldDk);border-radius:11px;padding:10px 13px;margin-bottom:11px;text-align:center}
  .countdown .t{font-family:'Cinzel';font-size:20px;font-weight:900;color:var(--gold);letter-spacing:2px}
  .countdown .l{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
  .hpwrap{height:14px;background:var(--void);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .prog{height:7px;background:var(--void);border-radius:4px;margin-top:8px;overflow:hidden;border:1px solid #00000060}
  .prog>div{height:100%;background:linear-gradient(90deg,var(--bloodDk),var(--blood),var(--goldLt));background-size:200% auto;animation:shimmer 3s linear infinite}
  .locked{opacity:.5;filter:grayscale(.6)}
  .lockbadge{font-size:10px;color:var(--faint)}
  footer{text-align:center;color:var(--faint);font-size:11px;padding:22px 0 34px;letter-spacing:2px;font-family:'Cinzel'}
  .modal{position:fixed;inset:0;background:#000b;display:grid;place-items:center;z-index:50;padding:20px;backdrop-filter:blur(3px)}
  .modal .box{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--gold);border-radius:16px;padding:24px;max-width:350px;width:100%;animation:fadeUp .3s}
  .pill{display:inline-flex;align-items:center;gap:5px;background:rgba(212,175,55,.12);border:1px solid var(--goldDk);color:var(--gold);border-radius:20px;padding:3px 10px;font-size:10.5px;font-weight:700}
  /* псевдо-3D карточка персонажа */
  .hero3d{position:relative;border-radius:18px;padding:22px 16px 18px;text-align:center;overflow:hidden;background:radial-gradient(ellipse at 50% 0%,rgba(200,16,46,.18),transparent 60%),linear-gradient(165deg,#221a20,#0e0a0d 80%);border:1px solid var(--goldDk);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 14px 40px rgba(0,0,0,.6)}
  .hero3d-glow{position:absolute;inset:0;background:conic-gradient(from 0deg at 50% 40%,transparent,rgba(212,175,55,.10),transparent 30%);animation:spin360 12s linear infinite;pointer-events:none}
  @keyframes spin360{to{transform:rotate(360deg)}}
  .hero3d-av{position:relative;width:210px;height:300px;margin:0 auto;display:grid;place-items:end center}
  .hero3d-av img{width:100%;height:100%;object-fit:contain;mix-blend-mode:screen;filter:drop-shadow(0 8px 16px rgba(0,0,0,.8));transform:perspective(700px) rotateX(2deg)}
  .hero3d-av::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:150px;height:20px;background:radial-gradient(ellipse,rgba(212,175,55,.45),transparent 70%);filter:blur(7px)}
  .hero3d-silhouette{font-size:120px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.6))}
  .hero3d-lvl{position:absolute;top:14px;right:14px;background:linear-gradient(180deg,var(--goldLt),var(--gold));color:#2a1f06;font-family:Cinzel;font-weight:900;font-size:12px;padding:3px 10px;border-radius:20px;box-shadow:0 3px 10px rgba(0,0,0,.5)}
  .hero3d-name{font-family:Cinzel;font-size:19px;font-weight:900;margin-top:14px;letter-spacing:.5px}
  .hero3d-power{font-size:12px;color:var(--gold);margin-top:3px}
  .slot{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1.5px solid var(--line);border-radius:12px;padding:9px 4px;text-align:center;cursor:pointer;transition:.15s}
  .slot:active{transform:scale(.95)}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<script>
const SUPABASE_URL  = "https://itxcdcujjtotaakowfni.supabase.co";
const SUPABASE_KEY  = "sb_publishable_oAHQoZlVJ9eCPZ4XkhlaSA_yzRTo-eF";
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const RANKS = [
  {n:"Fresh Meat",min:0,icon:"🥩"},{n:"Whimpering Pup",min:20,icon:"🐶"},
  {n:"Chained Mutt",min:50,icon:"⛓"},{n:"Pedigree Hound",min:100,icon:"🦴"},
  {n:"Leashed Beast",min:180,icon:"🐺"},{n:"Dungeon Alpha",min:280,icon:"👑"},
  {n:"Mistress' Shadow",min:400,icon:"🖤"},{n:"The Relic",min:600,icon:"💀"}
];
const TITLES=["Fucking Slave","Chained Hound","Good Little Bitch","Prime Doormat","Certified Simp","Pain Junkie","Gachi Lord ♂","Court Jester","The Disgrace","Mistress' Fool","Head Bitch In Charge","Mistress' Favorite ♀","Leather Daddy","Collared Pet","Dungeon Master ♂"];
const ACH_BAD=["Spanking Guaranteed — 10 lashes","Collar Issued","Gag Activated","Flogged in Public","Mistress' Doormat","Rock Bottom","Social Credit -1000","Corner Time","Cold Floor","Leashed Up","Quarantine Cage","Demoted"];
const ACH_GOOD=["Good Boy 🦴","Head Pats","At Her Feet","Mistress' Shield (1 spank block)","Best in Show","Fully Trained","Thong: Crown of the Dungeon","Mistress' Blanket","Personal Rug (luxury)","Golden Bowl"];
const WHEEL=[{t:"Spank x10",bad:true,rare:false},{t:"Good Boy",bad:false,rare:false},{t:"Gag",bad:true,rare:false},{t:"+15 OP",bad:false,rare:false},{t:"Cold Floor",bad:true,rare:false},{t:"GOLDEN BOWL",bad:false,rare:true},{t:"Public Flog",bad:true,rare:false},{t:"Head Pats",bad:false,rare:false}];
const MOVES=[{name:"Whip Strike",dmg:[12,22],type:"Domme",color:"var(--blood)"},{name:"Leash Grab",dmg:[8,16],type:"Control",color:"var(--violet)"},{name:"Gachi Slam ♂",dmg:[15,28],type:"Brutal",color:"var(--gold)"},{name:"Heel!",dmg:[6,12],type:"Will",color:"var(--goldLt)"},{name:"Seal of Submission",dmg:[10,20],type:"Cult",color:"var(--bloodDk)"}];
const ELITE_COUNCIL=5;

// ===== RPG: редкость, слоты, каталог шмота =====
const RARITY={
  common:{n:"Обычный",c:"#9aa0a6",mult:1},
  rare:{n:"Редкий",c:"#3b82f6",mult:1.6},
  epic:{n:"Эпический",c:"#a855f7",mult:2.4},
  legend:{n:"Легендарный",c:"#d4af37",mult:3.5}
};
const SLOTS=[["head","Голова","🎭"],["body","Тело","🦺"],["weapon","Оружие","🔱"],["collar","Ошейник","⛓"],["thong","Стринги","👙"]];
// каталог шмота: id, имя, слот, редкость, бонусы
const GEAR=[
  {id:"g1",n:"Кожаная маска",slot:"head",r:"common",str:2,def:3,spd:0},
  {id:"g2",n:"Капюшон ниндзя",slot:"head",r:"rare",str:4,def:5,spd:3},
  {id:"g3",n:"Корона Госпожи",slot:"head",r:"legend",str:8,def:8,spd:6},
  {id:"g4",n:"Жилет с шипами",slot:"body",r:"common",str:3,def:4,spd:-1},
  {id:"g5",n:"Латексный костюм",slot:"body",r:"epic",str:7,def:9,spd:4},
  {id:"g6",n:"Плеть",slot:"weapon",r:"common",str:5,def:0,spd:2},
  {id:"g7",n:"Шипованная булава",slot:"weapon",r:"rare",str:9,def:1,spd:0},
  {id:"g8",n:"Бензопила Макимы",slot:"weapon",r:"legend",str:15,def:2,spd:3},
  {id:"g9",n:"Стальной ошейник",slot:"collar",r:"common",str:1,def:4,spd:0},
  {id:"g10",n:"Ошейник с сердцем",slot:"collar",r:"epic",str:4,def:7,spd:5},
  {id:"g11",n:"Стринги «Корона»",slot:"thong",r:"legend",str:6,def:6,spd:10},
  {id:"g12",n:"Стринги «Енот»",slot:"thong",r:"rare",str:3,def:3,spd:6},
];
function gearById(id){return GEAR.find(g=>g.id===id);}
// боевая мощь = база статов + уровень + бонусы надетого шмота
function powerOf(s){
  let str=s.str||10,def=s.def||10,spd=s.spd||10;
  const eq=s.equipped||{};
  Object.values(eq).forEach(id=>{const g=gearById(id);if(g){str+=g.str;def+=g.def;spd+=g.spd;}});
  const lvlBonus=(s.lvl||1)*3;
  return {str:str+lvlBonus,def:def+lvlBonus,spd:spd+lvlBonus,total:Math.round((str+def+spd)*1.0+lvlBonus*3)};
}
function xpForNext(lvl){return lvl*100;}

function rankOf(op){let r=0;for(let i=0;i<RANKS.length;i++)if(op>=RANKS[i].min)r=i;return r;}
function nextRank(op){for(let i=0;i<RANKS.length;i++)if(op<RANKS[i].min)return RANKS[i];return null;}
function daysLeft(){const n=new Date();const end=new Date(n.getFullYear(),n.getMonth()+1,0);return Math.ceil((end-n)/(1000*60*60*24));}

let STATE={tab:"throne",slaves:[],log:[],isMistress:false,loading:true};

async function fetchAll(){
  const {data:slaves}=await db.from('slaves').select('*').order('op',{ascending:false});
  const {data:log}=await db.from('podval_log').select('*').order('t',{ascending:false}).limit(40);
  STATE.slaves=(slaves||[]).map(s=>({...s,titles:Array.isArray(s.titles)?s.titles:JSON.parse(s.titles||'[]'),ach:Array.isArray(s.ach)?s.ach:JSON.parse(s.ach||'[]'),inventory:Array.isArray(s.inventory)?s.inventory:JSON.parse(s.inventory||'[]'),equipped:(s.equipped&&typeof s.equipped==='object')?s.equipped:JSON.parse(s.equipped||'{}'),lvl:s.lvl||1,xp:s.xp||0,str:s.str||10,def:s.def||10,spd:s.spd||10,wins:s.wins||0,losses:s.losses||0}));
  STATE.log=log||[];STATE.loading=false;render();
}
async function pushLog(msg){if(!STATE.isMistress)return;await db.from('podval_log').insert({msg});}
async function updateSlave(id,patch){if(!STATE.isMistress){toast("Только Госпожа может это делать");return;}if(patch.op!==undefined)patch.rank=rankOf(patch.op);await db.from('slaves').update(patch).eq('id',id);await fetchAll();}
async function addSlave(nick){if(!STATE.isMistress)return;await db.from('slaves').insert({nick,op:0,rank:0,titles:[],ach:[],yard:false});await pushLog("🩸 Свежее мясо «"+nick+"» заползло в подвал");await fetchAll();}
async function removeSlave(id,nick){if(!STATE.isMistress)return;await db.from('slaves').delete().eq('id',id);await pushLog("🧹 «"+nick+"» вычищен из подвала");await fetchAll();}
async function checkSession(){const {data}=await db.auth.getSession();STATE.isMistress=!!(data&&data.session);}
async function login(email,pass){const {error}=await db.auth.signInWithPassword({email,password:pass});if(error){toast("Не вышло войти");return false;}await checkSession();await fetchAll();return true;}
async function logout(){await db.auth.signOut();STATE.isMistress=false;render();}

const app=document.getElementById('app');
function el(h){const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}
function toast(msg){const t=el(`<div style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);color:var(--gold);padding:10px 18px;border-radius:30px;z-index:99;font-size:13px;font-weight:700">${esc(msg)}</div>`);document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

function render(){
  if(STATE.loading){app.innerHTML='<div style="min-height:100vh;display:grid;place-items:center;color:var(--gold);font-family:Cinzel;letter-spacing:2px">Отпираем двери подвала…</div>';return;}
  const TABS=[["throne","Трон"],["hero","Перс"],["slaves","Рабы"],["wheel","Колесо"],["arena","Арена"],["court","Суд"],["cup","Сезон"]];
  app.innerHTML=`
    <header>
      <div class="brandrow">
        <div class="crest">М</div>
        <div style="flex:1">
          <div class="brandname">ПОДВАЛ МАКИМЫ</div>
          <div class="brandsub">${STATE.isMistress?"Трон Госпожи · полная власть":"Витрина · склони голову"}</div>
        </div>
        <button class="tapbtn btn sm ${STATE.isMistress?'ghost':'gold'}" onclick="${STATE.isMistress?'logout()':'openLogin()'}">${STATE.isMistress?"Выйти":"Вход Госпожи"}</button>
      </div>
      <nav>${TABS.map(([k,l])=>`<button class="tapbtn ${STATE.tab===k?'on':''}" onclick="go('${k}')">${l}</button>`).join('')}</nav>
    </header>
    <main id="main"></main>
    <footer>⛓ &nbsp; 18+ · ВСЁ ПО ФАНУ · СЛОВО ГОСПОЖИ — ЗАКОН &nbsp; ⛓</footer>`;
  const m=document.getElementById('main');
  ({throne:renderThrone,hero:renderHero,slaves:renderSlaves,wheel:renderWheel,arena:renderArena,court:renderCourt,cup:renderCup}[STATE.tab])(m);
}
function go(t){STATE.tab=t;render();}

function renderThrone(m){
  const total=STATE.slaves.reduce((a,s)=>a+s.op,0);
  const top=STATE.slaves[0];
  const dm=STATE.slaves.find(s=>s.titles.some(t=>t.includes("Dungeon Master")));
  const freeCouncil=Math.max(0,ELITE_COUNCIL-STATE.slaves.filter(s=>s.yard).length);
  m.innerHTML=`
    <div class="banner"><h1>ЗАЛ ТРОНА</h1><div class="s">Госпожа видит всё. Подвал у твоих ног.</div></div>
    <div class="countdown"><div class="t">${daysLeft()} ДНЕЙ</div><div class="l">до конца сезона · потом корона уйдёт</div></div>
    ${freeCouncil>0?`<div class="alert"><span class="dot"></span><span>В учсовете осталось <b style="color:#fff">${freeCouncil} мест</b> — кто не успеет, останется псом во дворе.</span></div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px">
      <div class="stat corner"><div class="v" style="color:var(--blood)">${STATE.slaves.length}</div><div class="l">Рабов</div></div>
      <div class="stat corner"><div class="v" style="color:var(--gold)">${total}</div><div class="l">Очков ОП</div></div>
      <div class="stat corner"><div class="v" style="color:var(--violet)">${dm?"♛":"—"}</div><div class="l">Dungeon Master</div></div>
    </div>
    ${top?`<div class="sect">Венценосный пёс</div>
    <div class="card gilded corner" style="display:flex;justify-content:space-between;align-items:center;animation:glow 5s infinite">
      <div><div style="font-size:18px;font-weight:800;display:flex;align-items:center;gap:7px">♛ ${esc(top.nick)}</div>
      <div style="font-size:12px;color:var(--gold)">${RANKS[top.rank].icon} ${RANKS[top.rank].n}</div></div>
      <div style="text-align:right"><div style="font-family:Cinzel;font-size:24px;font-weight:900;color:var(--gold)">${top.op}</div><div style="font-size:10px;color:var(--faint)">ОП</div></div>
    </div>`:''}
    <div class="sect">Хроника подвала</div>

async function trainStat(id,stat){const s=STATE.slaves.find(x=>x.id===id);if(s.op<5){toast("Мало ОП (нужно 5)");return;}const patch={op:s.op-5};patch[stat]=(s[stat]||10)+1;await updateSlave(id,patch);await pushLog("🏋️ «"+s.nick+"» прокачал "+({str:'Силу',def:'Защиту',spd:'Скорость'}[stat]));}
async function giveXp(id,amt){const s=STATE.slaves.find(x=>x.id===id);let xp=(s.xp||0)+amt,lvl=s.lvl||1;let leveled=false;while(xp>=xpForNext(lvl)){xp-=xpForNext(lvl);lvl++;leveled=true;}await updateSlave(id,{xp,lvl});if(leveled){await pushLog("⬆️ «"+s.nick+"» апнул уровень — теперь LVL "+lvl);toast("Уровень повышен! LVL "+lvl);}}
async function setAvatar(id){const v=document.getElementById('avurl').value.trim();await updateSlave(id,{avatar:v});toast("Аватар обновлён");}
async function giveGear(id){const gid=document.getElementById('givegear').value;if(!gid)return;const s=STATE.slaves.find(x=>x.id===id);await updateSlave(id,{inventory:[...(s.inventory||[]),gid]});const g=gearById(gid);await pushLog("🎁 «"+s.nick+"» получил ["+RARITY[g.r].n+"] "+g.n);toast("Выдано: "+g.n);}
async function equip(id,gid){const s=STATE.slaves.find(x=>x.id===id);const g=gearById(gid);const eq={...(s.equipped||{})};eq[g.slot]=gid;await updateSlave(id,{equipped:eq});}
async function unequip(id,slot){const s=STATE.slaves.find(x=>x.id===id);const eq={...(s.equipped||{})};delete eq[slot];await updateSlave(id,{equipped:eq});}
function openGearPicker(id,slot){const s=STATE.slaves.find(x=>x.id===id);const owned=(s.inventory||[]).map(gearById).filter(g=>g&&g.slot===slot);if(owned.length===0){toast("Нет шмота для слота");return;}const cur=(s.equipped||{})[slot];const m=el(`<div class="modal" onclick="if(event.target===this)this.remove()"><div class="box corner"><div style="font-family:Cinzel;font-size:17px;font-weight:900;color:var(--gold);margin-bottom:12px">Слот: ${SLOTS.find(x=>x[0]===slot)[1]}</div>${owned.map(g=>`<div class="card corner" style="border-color:${RARITY[g.r].c};cursor:pointer" onclick="equip(${id},'${g.id}');document.querySelector('.modal').remove()"><div style="font-weight:800">${esc(g.n)} ${cur===g.id?'✓':''}</div><div style="font-size:10px;color:var(--dim)">💪${g.str} 🛡${g.def} ⚡${g.spd}</div></div>`).join('')}${cur?`<button class="tapbtn btn ghost" style="width:100%" onclick="unequip(${id},'${slot}');document.querySelector('.modal').remove()">Снять текущее</button>`:''}</div></div>`);document.body.appendChild(m);}

function renderSlaves(m){
  if(!STATE.isMistress){m.innerHTML=`<div class="banner"><h1>РЕЕСТР РАБОВ</h1><div class="s">Только Госпожа правит. Ты — смотришь и завидуешь.</div></div>`+slaveList(false);return;}
  m.innerHTML=`<div class="banner"><h1>РЕЕСТР РАБОВ</h1><div class="s">Раздавай очки, ранги, титулы, ачивки — одним касанием.</div></div>

function toggle(id){openId=openId===id?null:id;render();}
async function doAdd(){const v=document.getElementById('newnick').value.trim();if(v)await addSlave(v);}
async function opChange(id,d){const s=STATE.slaves.find(x=>x.id===id);await updateSlave(id,{op:Math.max(0,s.op+d)});await pushLog((d>0?"➕":"➖")+" «"+s.nick+"» "+(d>0?"+":"")+d+" ОП");}

async function doRename(id){const s=STATE.slaves.find(x=>x.id===id);const v=prompt("Новое имя для «"+s.nick+"»:",s.nick);if(v&&v.trim()){await updateSlave(id,{nick:v.trim()});await pushLog("✏️ «"+s.nick+"» -> «"+v.trim()+"»");}}
async function doRemove(id){const s=STATE.slaves.find(x=>x.id===id);if(confirm("Изгнать «"+s.nick+"» из подвала?")){openId=null;await removeSlave(id,s.nick);}}

let wheelAngle=0;
function renderWheel(m){
  const seg=360/WHEEL.length;
  m.innerHTML=`<div class="banner"><h1>КОЛЕСО ГОСПОЖИ</h1><div class="s">Один оборот решает судьбу. Иногда падает золото.</div></div>
    <div class="alert"><span class="dot"></span><span>В колесе спрятан <b style="color:var(--gold)">ЗОЛОТОЙ дроп</b> — выпадает редко. Поймаешь?</span></div>
    ${STATE.isMistress?`<div class="card corner"><div class="lbl">Кого крутим</div><select id="wtarget">${STATE.slaves.map(s=>`<option value="${s.id}">${esc(s.nick)}</option>`).join('')}</select></div>`:'<div class="card muted">Колесо вращает только Госпожа.</div>'}
    <div style="position:relative;width:290px;height:290px;margin:10px auto">
      <div style="position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:22px solid var(--gold);z-index:5;filter:drop-shadow(0 0 4px var(--gold))"></div>
      <svg id="wheelsvg" width="290" height="290" viewBox="0 0 200 200" style="transition:transform 4.4s cubic-bezier(.15,.7,.18,1);filter:drop-shadow(0 0 16px rgba(212,175,55,.25))">
        <circle cx="100" cy="100" r="98" fill="none" stroke="var(--goldDk)" stroke-width="3"/>
        ${WHEEL.map((w,i)=>{const a0=(i*seg-90)*Math.PI/180,a1=((i+1)*seg-90)*Math.PI/180;const x0=100+94*Math.cos(a0),y0=100+94*Math.sin(a0),x1=100+94*Math.cos(a1),y1=100+94*Math.sin(a1);const mid=(a0+a1)/2,tx=100+58*Math.cos(mid),ty=100+58*Math.sin(mid);const col=w.rare?'#caa53a':(w.bad?(i%2?'#7a0a1c':'#c8102e'):(i%2?'#22503a':'#2f6b4a'));return `<g><path d="M100,100 L${x0},${y0} A94,94 0 0,1 ${x1},${y1} Z" fill="${col}" stroke="#0a0809" stroke-width="1.2"/><text x="${tx}" y="${ty}" fill="${w.rare?'#1a1405':'#fff'}" font-size="6.4" font-weight="800" text-anchor="middle" font-family="Manrope" transform="rotate(${mid*180/Math.PI+90},${tx},${ty})">${w.t}</text></g>`;}).join('')}

      </svg>
    </div>

    <div id="wresult"></div>`;
}
function spinWheel(){
  const seg=360/WHEEL.length;const idx=Math.floor(Math.random()*WHEEL.length);
  wheelAngle+=6*360+(360-idx*seg-seg/2);
  document.getElementById('wheelsvg').style.transform=`rotate(${wheelAngle}deg)`;
  setTimeout(async()=>{const r=WHEEL[idx];const s=STATE.slaves.find(x=>x.id===Number(document.getElementById('wtarget').value));
    document.getElementById('wresult').innerHTML=`<div class="card corner" style="text-align:center;border-color:${r.rare?'var(--gold)':r.bad?'var(--blood)':'var(--good)'};animation:${r.rare?'glow 1.2s 3':'bloodGlow 1.5s'};margin-top:14px"><div class="muted">${r.rare?'★ РЕДКИЙ ДРОП ★':'ВЫПАЛО'}</div><div style="font-family:Cinzel;font-size:24px;font-weight:900;color:${r.rare?'var(--gold)':r.bad?'var(--blood)':'var(--good)'};margin-top:4px">${r.t}</div></div>`;
    if(s){if(r.t==="+15 OP")await updateSlave(s.id,{op:s.op+15});if(r.rare)await updateSlave(s.id,{ach:[...new Set([...s.ach,"Golden Bowl"])]});await pushLog("🎡 «"+s.nick+"» -> "+r.t);}
  },4500);
}

      ${fc(sb,fight.hpB,fight.turn==="B"&&fight.on,'var(--violet)')}
    </div>
    ${!fight.on&&!fight.over?`<button class="tapbtn btn gold" style="width:100%;padding:15px;font-size:16px;font-family:Cinzel;letter-spacing:1px" onclick="startFight()">НАЧАТЬ БОЙ</button>`:''}
    ${fight.on&&!fight.over?`<div style="text-align:center;color:var(--faint);font-size:12px;margin-bottom:8px">${fight.turn==="A"?"Ход: "+esc(sa.nick):"Соперник готовит удар…"}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${MOVES.map((mv,i)=>`<button class="tapbtn btn" style="background:${mv.color};padding:12px 8px;text-align:left;opacity:${fight.turn==="A"?1:.4}" ${fight.turn!=="A"?'disabled':''} onclick="useMove(${i})"><div style="font-weight:800;font-size:13px">${mv.name}</div><div style="font-size:10px;opacity:.85">${mv.type} · ${mv.dmg[0]}–${mv.dmg[1]}</div></button>`).join('')}</div>`:''}
    ${fight.over?`<div class="card gilded corner" style="text-align:center;animation:glow 1.5s 2"><div class="muted">♛ ПОБЕДИТЕЛЬ ♛</div><div style="font-family:Cinzel;font-size:24px;font-weight:900;color:var(--gold);margin:6px 0">${esc((fight.over==="A"?sa:sb).nick)}</div><button class="tapbtn btn" onclick="startFight()">Реванш</button></div>`:''}
    ${fight.feed.length?`<div class="sect">Хроника боя</div>${fight.feed.slice(0,8).map((f,i)=>`<div style="font-size:12px;color:${i===0?'var(--text)':'var(--dim)'};padding:5px 0;border-bottom:1px solid var(--line)">${esc(f)}</div>`).join('')}`:''}`}`;
}
function fc(s,hp,active,color){return `<div class="corner" style="position:relative;flex:1;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid ${active?color:'var(--line)'};border-radius:13px;padding:13px;box-shadow:${active?'0 0 18px '+color+'66':'none'};animation:${active?'float 2s infinite':'none'}">
  <div style="font-size:14px;font-weight:800;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.nick)}</div>
  <div class="hpwrap"><div style="width:${hp}%;height:100%;background:${hp>40?'linear-gradient(90deg,'+color+',var(--gold))':'var(--bloodDk)'};transition:width .4s"></div></div>
  <div style="font-size:11px;color:var(--dim);margin-top:4px;text-align:right">${hp} HP</div></div>`;}
function setF(k,v){fight[k]=Number(v);fight.hpA=100;fight.hpB=100;fight.on=false;fight.over=null;fight.feed=[];render();}
function startFight(){fight.hpA=100;fight.hpB=100;fight.turn="A";fight.over=null;fight.feed=[];fight.on=true;render();}
function useMove(i){
  if(!fight.on||fight.over)return;const mv=MOVES[i];const s=STATE.slaves;const sa=s.find(x=>x.id===fight.a),sb=s.find(x=>x.id===fight.b);
  const pa=powerOf(sa),pb=powerOf(sb);
  const base=Math.floor(Math.random()*(mv.dmg[1]-mv.dmg[0]+1))+mv.dmg[0];
  const ratio=pa.str/Math.max(8,pb.def*0.7);
  const crit=Math.random()<(0.10+pa.spd/400);
  let real=Math.round(base*ratio*(crit?1.6:1));real=Math.max(2,real);
  fight.hpB=Math.max(0,fight.hpB-real);fight.feed.unshift(sa.nick+": "+mv.name+" -> "+real+(crit?" 💥КРИТ!":""));
  if(fight.hpB<=0)return endFight("A");fight.turn="B";render();
  setTimeout(()=>{const mv2=MOVES[Math.floor(Math.random()*MOVES.length)];const base2=Math.floor(Math.random()*(mv2.dmg[1]-mv2.dmg[0]+1))+mv2.dmg[0];const ratio2=pb.str/Math.max(8,pa.def*0.7);const c2=Math.random()<(0.10+pb.spd/400);let r2=Math.round(base2*ratio2*(c2?1.6:1));r2=Math.max(2,r2);
    fight.hpA=Math.max(0,fight.hpA-r2);fight.feed.unshift(sb.nick+": "+mv2.name+" -> "+r2+(c2?" 💥КРИТ!":""));
    if(fight.hpA<=0)return endFight("B");fight.turn="A";render();},850);
}
async function endFight(w){fight.over=w;fight.on=false;const s=STATE.slaves;const win=w==="A"?s.find(x=>x.id===fight.a):s.find(x=>x.id===fight.b);const los=w==="A"?s.find(x=>x.id===fight.b):s.find(x=>x.id===fight.a);render();if(STATE.isMistress){await updateSlave(win.id,{op:win.op+10,wins:(win.wins||0)+1});await updateSlave(los.id,{op:Math.max(0,los.op-5),losses:(los.losses||0)+1});await giveXp(win.id,40);await pushLog("⚔️ Арена: «"+win.nick+"» разнёс «"+los.nick+"» (+10 ОП, +40 опыта)");}}

const CHARGES=["опоздал к Госпоже","флудил не по делу","слил клан-катку","дерзил без Дня Бунта","не сделал поклон","выпрашивал внимание","ливнул с ивента","забыл, кто тут хозяйка"];
const VERDICTS=["10 ударов плетью по жопе","кляп на сутки","сутки на холодном полу","публичная порка при всех","разжалование на ранг вниз","неделя статуса «Личный коврик»","Долговая Яма до отыгрыша"];
let court={charge:null,verdict:null};
function renderCourt(m){
  m.innerHTML=`<div class="banner"><h1>СУД ПОДВАЛА</h1><div class="s">Барабан судьбы крутится. Молоток — у Госпожи.</div></div>
    <div class="card corner"><div class="lbl">Обвиняемый</div>
    <select id="acc" style="margin-bottom:13px">${STATE.slaves.map(s=>`<option value="${s.id}">${esc(s.nick)}</option>`).join('')}</select>
    ${STATE.isMistress?`<button class="tapbtn btn gold" style="width:100%;font-family:Cinzel;letter-spacing:1px" onclick="judge()">ВЫНЕСТИ ДЕЛО</button>`:'<div class="muted">Судит только Госпожа.</div>'}</div>
    <div id="verdict">${court.charge?verdictCard():''}</div>`;
}
function verdictCard(){return `<div class="card corner" style="border-color:var(--bloodDk)"><div class="muted">ОБВИНЕНИЕ</div><div style="font-size:16px;margin:4px 0 12px;font-style:italic">«${court.charge}»</div><div class="muted">ПРИГОВОР ГОСПОЖИ</div><div style="font-family:Cinzel;font-size:18px;font-weight:900;color:var(--blood);margin:4px 0">${court.verdict}</div></div>`;}
function judge(){let i=0;const iv=setInterval(()=>{court.charge=CHARGES[Math.floor(Math.random()*CHARGES.length)];court.verdict=VERDICTS[Math.floor(Math.random()*VERDICTS.length)];document.getElementById('verdict').innerHTML=verdictCard();if(++i>13){clearInterval(iv);const s=STATE.slaves.find(x=>x.id===Number(document.getElementById('acc').value));pushLog("⚖️ Суд: «"+s.nick+"» — "+court.verdict);}},85);}

function renderCup(m){
  const r=STATE.slaves;const bracket=r.slice(0,Math.min(8,r.length));
  m.innerHTML=`<div class="banner"><h1>СЕЗОН-ЛИГА</h1><div class="s">Таблица покорности и путь к короне Dungeon Master.</div></div>
    <div class="countdown"><div class="t">${daysLeft()} ДНЕЙ</div><div class="l">до финала · корона ждёт одного</div></div>
    <div class="sect">Таблица покорности</div>
    ${r.map((s,i)=>`<div class="card ${i===0?'gilded':''} corner" style="padding:11px 13px;display:flex;align-items:center;gap:12px">
      <div style="width:30px;text-align:center;font-family:Cinzel;font-weight:900;font-size:17px;color:${i===0?'var(--gold)':i<3?'var(--goldLt)':'var(--faint)'}">${i===0?'♛':i+1}</div>
      <div style="flex:1"><div style="font-weight:800">${esc(s.nick)}</div><div style="font-size:11px;color:var(--gold)">${RANKS[s.rank].icon} ${RANKS[s.rank].n}</div></div>
      <div style="font-family:Cinzel;font-weight:900;color:${i===0?'var(--gold)':'var(--blood)'}">${s.op}</div></div>`).join('')}
    ${bracket.length>=2?`<div class="sect">Плей-офф · топ-${bracket.length}</div><div class="card corner">${Array.from({length:Math.ceil(bracket.length/2)}).map((_,i)=>{const p1=bracket[i*2],p2=bracket[i*2+1];return `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)"><span style="flex:1;font-size:13px">${esc(p1?p1.nick:'—')}</span><span class="muted">vs</span><span style="flex:1;font-size:13px;text-align:right">${esc(p2?p2.nick:'(проход)')}</span></div>`;}).join('')}</div><div style="text-align:center;margin-top:14px;font-family:Cinzel;color:var(--gold);font-weight:700;letter-spacing:1px">♛ Победитель -> DUNGEON MASTER ♂</div>`:''}
    <div class="sect">Запертые титулы</div>
    <div class="card corner locked"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🔒</span><div><div style="font-weight:800">Head Bitch In Charge</div><div class="lockbadge">Откроется на ранге Dungeon Alpha · осталось мест: 1</div></div></div></div>
    <div class="card corner locked"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🔒</span><div><div style="font-weight:800">Верховный Жрец Культа</div><div class="lockbadge">Секретная ветка · только по выбору Госпожи</div></div></div></div>`;
}

function openLogin(){
  const m=el(`<div class="modal" onclick="if(event.target===this)this.remove()"><div class="box corner">
    <div style="font-family:Cinzel;font-size:20px;font-weight:900;color:var(--gold);margin-bottom:4px">Вход Госпожи</div>
    <div class="muted" style="margin-bottom:16px">Лишь ты держишь ключи от подвала.</div>
    <div class="lbl">Почта</div><input id="lemail" type="email" style="margin-bottom:10px"/>
    <div class="lbl">Пароль</div><input id="lpass" type="password" style="margin-bottom:18px"/>
    <button class="tapbtn btn gold" style="width:100%;font-family:Cinzel;letter-spacing:1px" onclick="doLogin(this)">Войти на трон</button>
  </div></div>`);
  document.body.appendChild(m);
}
async function doLogin(btn){const email=document.getElementById('lemail').value.trim();const pass=document.getElementById('lpass').value;btn.textContent="Входим…";btn.disabled=true;const ok=await login(email,pass);if(ok){document.querySelector('.modal').remove();render();toast("Добро пожаловать на трон, Госпожа");}else{btn.textContent="Войти на трон";btn.disabled=false;}}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escq(s){return String(s).replace(/'/g,"\\'");}

(async function(){
  if(SUPABASE_URL.includes("VSTAV")){app.innerHTML='<div style="padding:30px;color:var(--dim)">Вставь ключи Supabase.</div>';return;}
  await checkSession();await fetchAll();
})();
</script>
