<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Подвал Макимы — Движок Госпожи</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0809; --panel:#141013; --panel2:#1c161b; --line:#2e2630;
    --blood:#c8102e; --bloodDk:#7a0a1c; --gold:#d4af37; --goldLt:#f0d878; --goldDk:#8c7320;
    --violet:#8a4ad9; --text:#efe9f0; --dim:#a99fb0; --faint:#6e6470; --good:#46c98a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#0a0809;color:var(--text);font-family:'Manrope',system-ui,sans-serif;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(200,16,46,.10),transparent 55%),radial-gradient(ellipse at 50% 120%,rgba(212,175,55,.06),transparent 50%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1}
  @keyframes glow{0%,100%{box-shadow:0 0 0 rgba(212,175,55,0)}50%{box-shadow:0 0 26px rgba(212,175,55,.28)}}
  @keyframes bloodGlow{0%,100%{box-shadow:0 0 0 rgba(200,16,46,0)}50%{box-shadow:0 0 26px rgba(200,16,46,.4)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .tapbtn:active{transform:scale(.95)}
  ::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0a0809,#0a0809ee 70%,transparent);backdrop-filter:blur(6px);padding:14px 16px 0;border-bottom:1px solid transparent;border-image:linear-gradient(90deg,transparent,var(--goldDk),transparent) 1}
  .brandrow{display:flex;align-items:center;gap:12px}
  .crest{width:46px;height:46px;border-radius:50%;border:2px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:'Cinzel';font-weight:900;font-size:20px;background:radial-gradient(circle at 50% 30%,rgba(212,175,55,.18),transparent);animation:glow 4s infinite}
  .brandname{font-family:'Cinzel';font-size:21px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,var(--goldLt),var(--gold),var(--goldDk),var(--gold),var(--goldLt));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s linear infinite}
  .brandsub{font-size:10px;color:var(--faint);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
  nav{display:flex;gap:3px;margin-top:12px;overflow-x:auto}
  nav button{flex:0 0 auto;background:transparent;color:var(--dim);border:1px solid var(--line);border-bottom:none;border-radius:9px 9px 0 0;padding:9px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'Manrope';letter-spacing:.3px;transition:.15s}
  nav button.on{background:linear-gradient(180deg,var(--panel2),var(--panel));color:var(--gold);border-color:var(--goldDk)}
  main{padding:16px;max-width:780px;margin:0 auto;animation:fadeUp .4s}
  .card{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
  .card.gilded{border-color:var(--goldDk);box-shadow:inset 0 0 0 1px rgba(212,175,55,.08)}
  .corner::before,.corner::after{content:"";position:absolute;width:12px;height:12px;border-color:var(--gold);opacity:.5}
  .corner::before{top:6px;left:6px;border-top:1.5px solid;border-left:1.5px solid}
  .corner::after{bottom:6px;right:6px;border-bottom:1.5px solid;border-right:1.5px solid}
  .btn{background:linear-gradient(180deg,var(--blood),var(--bloodDk));color:#fff;border:none;border-radius:9px;padding:11px 17px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Manrope';letter-spacing:.3px}
  .btn.gold{background:linear-gradient(180deg,var(--goldLt),var(--gold));color:#2a1f06}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim)}
  .btn.sm{padding:8px 12px;font-size:12.5px}
  input,select{width:100%;background:var(--void);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:14px;outline:none;font-family:'Manrope'}
  input:focus,select:focus{border-color:var(--gold)}
  .tag{display:inline-block;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;margin:2px}
  .banner{margin-bottom:12px;border-left:3px solid;border-image:linear-gradient(180deg,var(--gold),var(--bloodDk)) 1;padding-left:13px}
  .banner h1{margin:0;font-family:'Cinzel';font-size:23px;font-weight:900;letter-spacing:1.5px}
  .banner .s{font-size:12px;color:var(--dim);margin-top:3px;font-style:italic}
  .stat{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:13px;padding:15px 8px;text-align:center;overflow:hidden}
  .stat .v{font-family:'Cinzel';font-size:27px;font-weight:900}
  .stat .l{font-size:9.5px;color:var(--faint);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
  .sect{font-family:'Cinzel';font-size:13px;color:var(--gold);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .sect::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--goldDk),transparent)}
  .lbl{font-size:11px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
  .muted{color:var(--faint);font-size:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .alert{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,rgba(200,16,46,.14),transparent);border:1px solid var(--bloodDk);border-radius:11px;padding:10px 13px;margin-bottom:11px;font-size:12.5px;color:#f0c0c8;animation:bloodGlow 3s infinite}
  .alert .dot{width:8px;height:8px;border-radius:50%;background:var(--blood);box-shadow:0 0 8px var(--blood);flex:0 0 auto}
  .countdown{background:rgba(212,175,55,.1);border:1px solid var(--goldDk);border-radius:11px;padding:10px 13px;margin-bottom:11px;text-align:center}
  .countdown .t{font-family:'Cinzel';font-size:20px;font-weight:900;color:var(--gold);letter-spacing:2px}
  .countdown .l{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
  .hpwrap{height:14px;background:var(--void);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .prog{height:7px;background:var(--void);border-radius:4px;margin-top:8px;overflow:hidden;border:1px solid #00000060}
  .prog>div{height:100%;background:linear-gradient(90deg,var(--bloodDk),var(--blood),var(--goldLt));background-size:200% auto;animation:shimmer 3s linear infinite}
  .locked{opacity:.5;filter:grayscale(.6)}
  .lockbadge{font-size:10px;color:var(--faint)}
  footer{text-align:center;color:var(--faint);font-size:11px;padding:22px 0 34px;letter-spacing:2px;font-family:'Cinzel'}
  .modal{position:fixed;inset:0;background:#000b;display:grid;place-items:center;z-index:50;padding:20px;backdrop-filter:blur(3px)}
  .modal .box{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--gold);border-radius:16px;padding:24px;max-width:350px;width:100%;animation:fadeUp .3s}
  .pill{display:inline-flex;align-items:center;gap:5px;background:rgba(212,175,55,.12);border:1px solid var(--goldDk);color:var(--gold);border-radius:20px;padding:3px 10px;font-size:10.5px;font-weight:700}
  /* ===== ЛУТБОКСЫ ===== */
  @keyframes boxShake{0%,100%{transform:translateY(0) rotate(0)}20%{transform:translateY(-3px) rotate(-4deg)}40%{transform:translateY(-1px) rotate(4deg)}60%{transform:translateY(-2px) rotate(-3deg)}80%{transform:translateY(-1px) rotate(2deg)}}
  @keyframes lootPop{0%{opacity:0;transform:scale(.7) translateY(10px)}55%{transform:scale(1.06)}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes lootGlow{0%,100%{box-shadow:0 0 14px var(--glow),inset 0 0 0 1px var(--ring)}50%{box-shadow:0 0 26px var(--glow),inset 0 0 0 1px var(--ring)}}
  .lootbox{position:relative;cursor:pointer;text-align:center;padding:14px 6px 11px;border-radius:14px;
    background:radial-gradient(120% 90% at 50% 0%,rgba(255,255,255,.06),transparent 60%),linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--ring);transition:transform .16s,box-shadow .25s;animation:lootGlow 3.6s ease-in-out infinite}
  .lootbox:active{transform:scale(.94)}
  .lootbox:not(.locked):hover{transform:translateY(-3px) scale(1.03)}
  .lootbox.locked{opacity:.42;filter:grayscale(.5);cursor:default;animation:none}
  .lootbox.shaking{animation:boxShake .45s ease-in-out}
  .lootbox-ico{font-size:38px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6)) drop-shadow(0 0 8px var(--glow))}
  .lootbox-name{font-family:Cinzel;font-weight:700;font-size:11px;color:var(--text);margin-top:5px;letter-spacing:.3px}
  .lootbox-cost{font-size:13px;font-weight:800;margin-top:3px}
  .loot-drop{margin-top:13px;padding:16px;border-radius:14px;text-align:center;animation:lootPop .5s cubic-bezier(.22,1,.36,1) both;
    background:radial-gradient(130% 100% at 50% 0%,color-mix(in srgb,var(--c) 22%,transparent),transparent 65%),linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--c);box-shadow:0 0 24px color-mix(in srgb,var(--c) 45%,transparent)}
  .loot-drop-rar{font-family:Cinzel;font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase}
  .loot-drop-name{font-family:Cinzel;font-weight:900;font-size:20px;margin-top:4px;color:var(--text)}
  /* ===== ИГРОВЫЕ КАПСУЛЫ ===== */
  .gcard{position:relative;border-radius:16px;padding:15px;margin-bottom:13px;
    background:radial-gradient(140% 100% at 50% -10%,rgba(212,175,55,.07),transparent 55%),linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 6px 20px rgba(0,0,0,.4)}
  .ghead{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .gico{width:46px;height:46px;flex:0 0 auto;border-radius:13px;display:grid;place-items:center;font-size:24px;
    background:radial-gradient(circle at 50% 30%,rgba(212,175,55,.22),rgba(0,0,0,.3));border:1px solid var(--goldDk);
    box-shadow:inset 0 0 12px rgba(0,0,0,.5),0 0 10px rgba(212,175,55,.12)}
  .gtitle{font-family:Cinzel;font-weight:900;font-size:16px;color:var(--gold);letter-spacing:.5px}
  .gsub{font-size:11px;color:var(--faint);margin-top:2px;line-height:1.35}
  .gstage{text-align:center;margin:4px 0 12px;padding:14px 0;border-radius:13px;
    background:radial-gradient(80% 120% at 50% 0%,rgba(0,0,0,.5),rgba(0,0,0,.2));
    box-shadow:inset 0 2px 10px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.03);
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))}
  .gbtn{width:100%;font-family:Cinzel;letter-spacing:.8px;box-shadow:0 4px 14px rgba(212,175,55,.25)}
  .gres{text-align:center;margin-top:9px;min-height:18px;font-size:13px}
  .gnum{width:52px;height:52px;border-radius:13px;font-size:20px;font-family:Cinzel;font-weight:900;color:var(--goldLt);cursor:pointer;
    background:linear-gradient(180deg,rgba(122,10,28,.55),rgba(60,5,14,.55));border:1px solid var(--bloodDk);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 3px 8px rgba(0,0,0,.4);transition:transform .14s,box-shadow .2s}
  .gnum:not(.locked):hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(200,16,46,.35);color:#fff}
  .gnum:active{transform:scale(.92)}
  .gnum.locked{opacity:.4;cursor:default}
  /* псевдо-3D карточка персонажа */
  .hero3d{position:relative;border-radius:18px;padding:22px 16px 18px;text-align:center;overflow:hidden;background:radial-gradient(ellipse at 50% 45%,#000 0%,#000 38%,#1a1218 78%,#0a0809 100%);border:1px solid var(--goldDk);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 14px 40px rgba(0,0,0,.6)}
  .hero3d-glow{position:absolute;inset:0;background:conic-gradient(from 0deg at 50% 40%,transparent,rgba(212,175,55,.10),transparent 30%);animation:spin360 12s linear infinite;pointer-events:none}
  @keyframes spin360{to{transform:rotate(360deg)}}
  .hero3d-av{position:relative;width:100%;max-width:330px;aspect-ratio:3/4;margin:0 auto;display:grid;place-items:end center}
  .hero3d-av img{width:100%;height:100%;object-fit:contain;object-position:bottom center;mix-blend-mode:screen;filter:brightness(1.04) contrast(1.18) drop-shadow(0 8px 16px rgba(0,0,0,.8))}
  .hero3d-av::after{content:"";position:absolute;bottom:3%;left:50%;transform:translateX(-50%);width:62%;height:18px;background:radial-gradient(ellipse,rgba(212,175,55,.5),transparent 70%);filter:blur(9px);z-index:1}
  .hero3d-silhouette{font-size:150px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.6))}
  .hero3d-lvl{position:absolute;top:14px;right:14px;background:linear-gradient(180deg,var(--goldLt),var(--gold));color:#2a1f06;font-family:Cinzel;font-weight:900;font-size:12px;padding:3px 10px;border-radius:20px;box-shadow:0 3px 10px rgba(0,0,0,.5)}
  .hero3d-name{font-family:Cinzel;font-size:19px;font-weight:900;margin-top:14px;letter-spacing:.5px}
  .hero3d-power{font-size:12px;color:var(--gold);margin-top:3px}
  .slot{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1.5px solid var(--line);border-radius:12px;padding:9px 4px;text-align:center;cursor:pointer;transition:.15s}
  .slot:active{transform:scale(.95)}

  /* ===== Enhanced RPG Design ===== */
  .inv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(min-width:520px){.inv-grid{grid-template-columns:repeat(3,1fr)}}
  .gear-card{position:relative;border-radius:13px;overflow:hidden;padding:12px;transition:transform .16s,box-shadow .16s;background:linear-gradient(180deg,var(--panel2),var(--panel))}
  .gear-card:hover{transform:translateY(-2px)}
  .gear-img-w{height:120px;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.5),rgba(0,0,0,.8));border-radius:9px;margin-bottom:9px;overflow:hidden;position:relative}
  .gear-img-w img{max-height:120px;max-width:100%;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.18) contrast(1.14) drop-shadow(0 4px 10px rgba(0,0,0,.7))}
  .gear-slot-ic{font-size:34px;opacity:.4}
  .rglow-myth{box-shadow:0 0 20px rgba(200,16,46,.5),inset 0 0 14px rgba(200,16,46,.12),0 0 0 1px rgba(200,16,46,.3)}
  .rglow-leg{box-shadow:0 0 16px rgba(212,175,55,.5),inset 0 0 12px rgba(212,175,55,.1),0 0 0 1px rgba(212,175,55,.25)}
  .rglow-epic{box-shadow:0 0 12px rgba(168,85,247,.45),inset 0 0 10px rgba(168,85,247,.08),0 0 0 1px rgba(168,85,247,.2)}
  .rglow-rare{box-shadow:0 0 8px rgba(59,130,246,.4),0 0 0 1px rgba(59,130,246,.15)}
  .ach-pb{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:6px;overflow:hidden}
  .ach-pb>div{height:100%;border-radius:2px;transition:width .5s}
  .ach-grid{display:grid;gap:9px}
  .ach-card{display:flex;align-items:flex-start;gap:11px;border-radius:13px;padding:12px 14px;border:1px solid;transition:.14s}
  .ach-card:hover{filter:brightness(1.06)}
  .ach-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;border:2px solid}
  .gear-worn-badge{position:absolute;top:4px;right:4px;background:var(--good);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.3px}
  .gear-new-badge{position:absolute;top:4px;left:4px;background:var(--violet);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.3px;animation:glow 2s infinite}
  .stat-mini{font-size:10px;color:var(--dim);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
  .stat-mini span{background:rgba(255,255,255,.05);border-radius:5px;padding:1px 5px}
  /* === атмосфера Комнаты === */
  @keyframes torchFlicker{0%,100%{opacity:.9;filter:brightness(1)}25%{opacity:.7;filter:brightness(1.2)}50%{opacity:1;filter:brightness(.9)}75%{opacity:.8;filter:brightness(1.15)}}
  @keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.012)}}
  @keyframes dustRise{0%{transform:translateY(0);opacity:0}20%{opacity:.5}100%{transform:translateY(-90px);opacity:0}}
  @keyframes rankPulse{0%,100%{text-shadow:0 0 6px rgba(212,175,55,.4)}50%{text-shadow:0 0 16px rgba(212,175,55,.9),0 0 26px rgba(212,175,55,.4)}}
  @keyframes embers{0%{transform:translateY(0) translateX(0);opacity:0}15%{opacity:.7}100%{transform:translateY(-70px) translateX(8px);opacity:0}}
  .room-scene{position:relative;border-radius:18px;overflow:hidden;padding:26px 16px 22px;text-align:center;margin-bottom:16px;
    border:1px solid var(--goldDk);
    background:radial-gradient(ellipse at 50% 0%,rgba(200,16,46,.14),transparent 55%),linear-gradient(180deg,#1a1216,#0c0809);}
  .room-scene::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg,transparent,transparent 44px,rgba(0,0,0,.35) 44px,rgba(0,0,0,.35) 46px),
               repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(0,0,0,.22) 30px,rgba(0,0,0,.22) 32px);opacity:.45}
  .torch{position:absolute;top:14px;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle,#ffcf6b,#c8102e 70%,transparent);animation:torchFlicker 1.4s infinite;filter:blur(1px)}
  .torch.l{left:18px}.torch.r{right:18px}
  .room-char{width:100%;max-width:200px;aspect-ratio:1/1;margin:0 auto;position:relative;z-index:2;
    filter:drop-shadow(0 8px 20px rgba(200,16,46,.45))}
  .ember{position:absolute;bottom:10px;width:3px;height:3px;border-radius:50%;background:#ffb347;z-index:1;animation:embers 3.5s linear infinite}
  .rank-line{font-size:12px;color:var(--goldLt);animation:rankPulse 3s ease-in-out infinite;font-family:Cinzel;font-weight:700;letter-spacing:.5px}
  .loot-cell{width:54px;height:54px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;transition:transform .18s,box-shadow .18s;cursor:default}
  .loot-cell.has:hover{transform:translateY(-3px) scale(1.06)}
  .medal-coin{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;transition:transform .2s}
  .medal-coin:hover{transform:rotate(-8deg) scale(1.12)}
  /* === АУРЫ ПО РАНГАМ === */
  @keyframes auraPulse{0%,100%{opacity:.5;transform:translateX(-50%) scale(1)}50%{opacity:.85;transform:translateX(-50%) scale(1.08)}}
  .rank-aura{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;height:80%;border-radius:50%;z-index:1;pointer-events:none;filter:blur(28px);animation:auraPulse 3.5s ease-in-out infinite}
  .rank-aura-0{background:radial-gradient(circle,rgba(110,100,112,.25),transparent 70%)}
  .rank-aura-1{background:radial-gradient(circle,rgba(70,201,138,.28),transparent 70%)}
  .rank-aura-2{background:radial-gradient(circle,rgba(91,141,239,.30),transparent 70%)}
  .rank-aura-3{background:radial-gradient(circle,rgba(138,74,217,.34),transparent 70%)}
  .rank-aura-4{background:radial-gradient(circle,rgba(200,16,46,.38),transparent 70%)}
  .rank-aura-5{background:radial-gradient(circle,rgba(200,16,46,.46),rgba(212,175,55,.2),transparent 72%)}
  .rank-aura-6{background:radial-gradient(circle,rgba(212,175,55,.48),rgba(200,16,46,.22),transparent 74%)}
  .rank-aura-7{background:radial-gradient(circle,rgba(240,216,120,.6),rgba(212,175,55,.35),transparent 78%)}

  /* ===== ЖИВОЙ ПЕРСОНАЖ: дыхание, покачивание, реакция, смена шмота ===== */
  @keyframes charBreathe{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-1.4%) scaleY(1.014)}}

// ===== ПЕРСОНАЖ СЛОЯМИ: база-перс + вырезанный шмот поверх (бумажная кукла) =====
const BASE_CHAR="https://raw.githubusercontent.com/Makima-lab/podval/main/IMG_20260610_015043_151.jpg";
const LAYER_ORDER=["body","thong","collar","head","weapon"]; // порядок наложения (низ→верх)
// Возвращает div со стопкой картинок: база снизу, шмот с прозрачным фоном поверх, всё выровнено.
function buildCharLayers(s){
  const eq=s.equipped||{};
  const base=s.avatar||BASE_CHAR;
  // база: jpg с чёрным фоном → mix-blend-mode:screen выбивает чёрное на тёмной карточке
  let html=`<img src="${esc(base)}" alt="" class="lyr" loading="lazy" decoding="async" style="z-index:1"/>`;
  LAYER_ORDER.forEach((slot,i)=>{
    const g=eq[slot]?gearById(eq[slot]):null;
    if(g&&g.pose){ // вырезанный слой-картинка кладётся ровно поверх; screen выбивает чёрный фон у PNG
      html+=`<img src="${esc(g.pose)}" alt="" class="lyr" loading="lazy" decoding="async" style="z-index:${i+2};animation-delay:${(i+1)*0.05}s"/>`;
    }
  });
  // искры-аура: чем редче надетый шмот (эпик+), тем заметнее восходящие частицы его цвета
  const rar=topEquipRarity(s);
  let sparks='';
  if(rar){
    const col=RARITY[rar].c;
    const n={epic:5,legend:7,mythic:10}[rar]||5;
    for(let i=0;i<n;i++){
      const left=12+Math.random()*76, dur=2.2+Math.random()*2.2, del=Math.random()*dur, sz=3+Math.random()*4;
      sparks+=`<i class="char-spark" style="color:${col};background:${col};left:${left.toFixed(1)}%;width:${sz.toFixed(1)}px;height:${sz.toFixed(1)}px;animation-duration:${dur.toFixed(2)}s;animation-delay:${del.toFixed(2)}s"></i>`;
    }
  }
  // перс в живой сцене (сцена/подиум рисуются в renderHero вокруг этой стопки)
  return `<div class="char-stage">
    ${sparks}
    <div class="char-anim" onclick="charReact(this)">${html}</div>
  </div>`;
}
// высшая редкость среди надетого (для искр-ауры): показываем только эпик и выше
const RAR_ORDER=['common','rare','epic','legend','mythic'];
function topEquipRarity(s){let best=-1;Object.values(s.equipped||{}).forEach(id=>{const g=gearById(id);if(g){const i=RAR_ORDER.indexOf(g.r);if(i>best)best=i;}});return best>=2?RAR_ORDER[best]:null;}
function setupParallax(){/* параллакс отключён: transform на ancestor ломает screen-вырез фона персонажа */}
// тап по персу — пружинный «флекс» + золотые искры + вибро
function charReact(elm){
  const st=elm&&(elm.closest('.char-stage')); if(!st)return;
  if(elm.classList){elm.classList.remove('flex');void elm.offsetWidth;elm.classList.add('flex');setTimeout(()=>elm.classList.remove('flex'),640);}
  const ring=document.createElement('div'); ring.className='char-ring-burst'; ring.style.borderColor='#ffd86b'; st.appendChild(ring); setTimeout(()=>ring.remove(),700);
  for(let i=0;i<10;i++){
    const ang=(Math.PI*2*i)/10, dist=28+Math.random()*30;
    const p=document.createElement('i'); p.className='burst-p';
    p.style.cssText=`--dx:${(Math.cos(ang)*dist)|0}px;--dy:${(Math.sin(ang)*dist)|0}px;background:#ffd86b;color:#ffd86b`;
    st.appendChild(p); setTimeout(()=>p.remove(),650);
  }
  try{TG&&TG.HapticFeedback&&TG.HapticFeedback.impactOccurred('light');}catch(e){}
}
// зрелищный эффект смены шмота: вспышка + кольцо-волна + взрыв частиц цвета редкости + тряска
function charFlash(rar){
  const col=(rar&&RARITY[rar])?RARITY[rar].c:'#d4af37';
  document.querySelectorAll('.char-stage').forEach(st=>{
    const f=document.createElement('div'); f.className='char-flash'; st.appendChild(f); setTimeout(()=>f.remove(),750);
    const ring=document.createElement('div'); ring.className='char-ring-burst'; ring.style.borderColor=col; st.appendChild(ring); setTimeout(()=>ring.remove(),700);
    for(let i=0;i<16;i++){
      const ang=(Math.PI*2*i)/16, dist=42+Math.random()*44;
      const p=document.createElement('i'); p.className='burst-p';
      p.style.cssText=`--dx:${(Math.cos(ang)*dist).toFixed(0)}px;--dy:${(Math.sin(ang)*dist).toFixed(0)}px;background:${col};color:${col}`;
      st.appendChild(p); setTimeout(()=>p.remove(),650);
    }
  });
  document.querySelectorAll('.hero3d').forEach(c=>{c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');});
  try{TG&&TG.HapticFeedback&&TG.HapticFeedback.impactOccurred(rar==='mythic'||rar==='legend'?'heavy':'medium');}catch(e){}
}

function cosmeticUnlocked(s,type,key){const o=COSMETICS[type].find(x=>x.key===key);return o?(STATE.isMistress||o.unlock(s)):false;}
function cosmeticDef(type,key){return COSMETICS[type].find(x=>x.key===key)||COSMETICS[type][0];}
function getCos(s,type){const c=(s.cosmetics||{})[type];return (c&&cosmeticUnlocked(s,type,c))?c:COSMETICS[type][0].key;}
// какие сеты полностью НАДЕТЫ на рабе
function fullSets(s){const eq=Object.values(s.equipped||{});const es=new Set(eq);return SETS.filter(set=>set.items.every(it=>es.has(it)));}
// бонус статов от собранных сетов
function setBonus(s){const b={str:0,def:0,spd:0};fullSets(s).forEach(set=>{if(set.stat.str)b.str+=set.stat.str;if(set.stat.def)b.def+=set.stat.def;if(set.stat.spd)b.spd+=set.stat.spd;});return b;}
// боевая мощь = база статов + уровень + бонусы надетого шмота
function powerOf(s){
  let str=s.str||10,def=s.def||10,spd=s.spd||10;
  const eq=s.equipped||{};
  Object.values(eq).forEach(id=>{const g=gearById(id);if(g){str+=g.str;def+=g.def;spd+=g.spd;}});
  const sb=setBonus(s); str+=sb.str; def+=sb.def; spd+=sb.spd;
  const lvlBonus=(s.lvl||1)*3;
  return {str:str+lvlBonus,def:def+lvlBonus,spd:spd+lvlBonus,total:Math.round((str+def+spd)*1.0+lvlBonus*3)};
}

function daysLeft(){const n=new Date();const end=new Date(n.getFullYear(),n.getMonth()+1,0);return Math.ceil((end-n)/(1000*60*60*24));}

async function tryTokenLogin(){
  if(!STATE.loginToken||!STATE.slaveId)return;
  try{
    const {data,error}=await db.rpc('check_login_token',{p_id:STATE.slaveId,p_token:STATE.loginToken});
    if(!error&&data===true){
      STATE.slaveAuth=STATE.slaveId;
      // чистим токен из адресной строки, чтобы не светился и не переиспользовался
      try{history.replaceState(null,'','?id='+STATE.slaveId);}catch(e){}
      toast("Кабинет открыт 🔓");
    }
  }catch(e){}
  STATE.loginToken=null;
}

const BOT_ACH_MAP={first:'first_bow',dog50:'loyal_pup',loyal500:'faithful',relic5000:'relic',porka:'whip_taste',bdsm:'hard_bdsm',gag20:'gagged',masochist:'masochist',midnight:'midnight',streak7:'streak7',streak30:'marathon',streak365:'immortal'};
async function fetchAll(){
  const {data:slaves}=await db.from('slaves').select(SLAVE_COLS).order('op',{ascending:false});
  const {data:log}=await db.from('podval_log').select('*').order('t',{ascending:false}).limit(40);
  STATE.slaves=(slaves||[]).map(s=>{
    const ach=Array.isArray(s.ach)?s.ach:JSON.parse(s.ach||'[]');
    const botAch=(s.earned_ach&&typeof s.earned_ach==='object')?s.earned_ach:JSON.parse(s.earned_ach||'{}');
    // переносим ачивки, выданные ботом, в общий список сайта
    const merged=new Set(ach);
    Object.keys(botAch).forEach(k=>{if(BOT_ACH_MAP[k])merged.add(BOT_ACH_MAP[k]);});
    return {...s,titles:Array.isArray(s.titles)?s.titles:JSON.parse(s.titles||'[]'),ach:[...merged],inventory:Array.isArray(s.inventory)?s.inventory:JSON.parse(s.inventory||'[]'),equipped:(s.equipped&&typeof s.equipped==='object')?s.equipped:JSON.parse(s.equipped||'{}'),lvl:s.lvl||1,xp:s.xp||0,str:s.str||10,def:s.def||10,spd:s.spd||10,wins:s.wins||0,losses:s.losses||0,status:s.status||'',shards:s.shards||0,season_op:s.season_op||0,pain:s.pain||0,game_cd:(s.game_cd&&typeof s.game_cd==='object')?s.game_cd:JSON.parse(s.game_cd||'{}'),season_claimed:Array.isArray(s.season_claimed)?s.season_claimed:JSON.parse(s.season_claimed||'[]'),pity:(s.pity&&typeof s.pity==='object')?s.pity:JSON.parse(s.pity||'{"sinceRare":0,"sinceEpic":0,"sinceLegend":0,"total":0}'),cosmetics:(s.cosmetics&&typeof s.cosmetics==='object')?s.cosmetics:JSON.parse(s.cosmetics||'{}')};
  });
  STATE.log=log||[];STATE.loading=false;render();
}
async function pushLog(msg){if(!STATE.isMistress)return;await db.from('podval_log').insert({msg});}
async function updateSlave(id,patch){
  if(!STATE.isMistress){toast("Только Госпожа может это делать");return;}
  if(patch.op!==undefined)patch.rank=rankOf(patch.op);
  await db.from('slaves').update(patch).eq('id',id);
  await autoAchievements(id);   // проверить и выдать авто-достижения
  await fetchAll();
}
// Проверяет условия достижений по свежим данным раба, выдаёт новые + бонусные ОП
async function autoAchievements(id){
  const {data:rows}=await db.from('slaves').select(SLAVE_COLS).eq('id',id).limit(1);
  if(!rows||!rows[0])return;
  const raw=rows[0];
  const s={...raw,
    ach:Array.isArray(raw.ach)?raw.ach:JSON.parse(raw.ach||'[]'),
    equipped:(raw.equipped&&typeof raw.equipped==='object')?raw.equipped:JSON.parse(raw.equipped||'{}'),
    inventory:Array.isArray(raw.inventory)?raw.inventory:JSON.parse(raw.inventory||'[]')};
  const earned=checkAchievements(s);
  if(!earned.length)return;
  let bonus=0; earned.forEach(aid=>{const a=achById(aid);if(a&&a.op)bonus+=a.op;});
  const newAch=[...new Set([...(s.ach||[]),...earned])];
  const newOp=(s.op||0)+bonus;
  await db.from('slaves').update({ach:newAch,op:newOp,rank:rankOf(newOp)}).eq('id',id);
  for(const aid of earned){const a=achById(aid);await db.from('podval_log').insert({msg:"🏆 «"+s.nick+"» открыл достижение «"+a.n+"»"+(a.op?" (+"+a.op+" ОП)":"")});}
}

async function removeSlave(id,nick){if(!STATE.isMistress)return;await db.from('slaves').delete().eq('id',id);await pushLog("🧹 «"+nick+"» вычищен из подвала");await fetchAll();}

// порядок сегментов на колесе (визуально), редкости из WHEEL_ODDS
const WHEEL_ORDER=["common","rare","common","epic","common","legend","rare","mythic"];
const SHARD_DUP=8;      // осколков за дубликат
const SHARD_NOITEM=12;  // осколков, если по редкости нет предмета
let wheelAngle=0, wheelBusy=false;
function defaultPity(){return {sinceRare:0,sinceEpic:0,sinceLegend:0,total:0};}
// чистый расчёт результата крутки с учётом pity (тестируемо отдельно)
function rollRarity(pity){
  const p={...defaultPity(),...(pity||{})};
  p.total++; p.sinceRare++; p.sinceEpic++; p.sinceLegend++;
  let rar;
  // hard/soft pity сверху вниз
  if(p.sinceLegend>=PITY.legend){rar="legend";}
  else if(p.sinceEpic>=PITY.epic){rar="epic";}
  else if(p.sinceRare>=PITY.rare){rar="rare";}
  else{
    const roll=Math.random()*100; let acc=0; rar="common";
    for(const [r,ch] of WHEEL_ODDS){acc+=ch; if(roll<acc){rar=r;break;}}
  }
  // сброс счётчиков по полученной редкости и выше
  if(rar==="rare"){p.sinceRare=0;}
  if(rar==="epic"){p.sinceRare=0;p.sinceEpic=0;}
  if(rar==="legend"){p.sinceRare=0;p.sinceEpic=0;p.sinceLegend=0;}
  if(rar==="mythic"){p.sinceRare=0;p.sinceEpic=0;p.sinceLegend=0;}
  return {rar,pity:p};
}

function spinWheel(){
  if(wheelBusy)return;
  const sel=document.getElementById('wtarget'); if(!sel){toast("Выбери раба");return;}
  const s=STATE.slaves.find(x=>x.id===Number(sel.value)); if(!s){toast("Раб не найден");return;}
  wheelBusy=true; const btn=document.getElementById('wspin'); if(btn){btn.disabled=true;btn.style.opacity=.5;}
  const {rar,pity}=rollRarity(s.pity);
  // выбрать визуальный сегмент, совпадающий с выпавшей редкостью
  const cand=WHEEL_ORDER.map((r,i)=>r===rar?i:-1).filter(i=>i>=0);
  const idx=cand.length?cand[Math.floor(Math.random()*cand.length)]:0;
  const seg=360/WHEEL_ORDER.length;
  wheelAngle+=6*360+(360-idx*seg-seg/2);
  const svg=document.getElementById('wheelsvg'); if(svg)svg.style.transform=`rotate(${wheelAngle}deg)`;
  setTimeout(async()=>{
    // какие предметы этой редкости раб ещё не имеет
    const owned=new Set(s.inventory||[]);
    const pool=GEAR.filter(g=>g.r===rar);
    const fresh=pool.filter(g=>!owned.has(g.id));
    let gotItem=null, shardGain=0, patch={pity};
    if(fresh.length){
      gotItem=fresh[Math.floor(Math.random()*fresh.length)];
      patch.inventory=[...(s.inventory||[]),gotItem.id];
    } else if(pool.length){
      // дубликат — компенсация осколками
      shardGain=SHARD_DUP*(rar==="legend"||rar==="mythic"?3:rar==="epic"?2:1);
      patch.shards=(s.shards||0)+shardGain;
    } else {
      // по этой редкости вообще нет предметов в каталоге
      shardGain=SHARD_NOITEM;
      patch.shards=(s.shards||0)+shardGain;
    }
    await updateSlave(s.id,patch);
    const col=RARITY[rar].c, isHigh=(rar==="legend"||rar==="mythic");
    document.getElementById('wresult').innerHTML=`<div class="card corner" style="text-align:center;border-color:${col};animation:${isHigh?'glow 1.2s 3':'bloodGlow 1.5s'};margin-top:14px">
      <div class="muted">${isHigh?'★ РЕДЧАЙШИЙ ДРОП ★':'ВЫПАЛО'} · <span style="color:${col};font-weight:800">${RARITY[rar].n}</span></div>
      <div style="font-family:Cinzel;font-size:23px;font-weight:900;color:${col};margin-top:4px">${gotItem?esc(gotItem.n):'💎 +'+shardGain+' осколков'}</div>
      ${gotItem?`<div class="muted" style="margin-top:4px">💪${gotItem.str} 🛡${gotItem.def} ⚡${gotItem.spd} → в инвентарь «${esc(s.nick)}»</div>`:`<div class="muted" style="margin-top:4px">Дубликат/нет нового предмета — осколки в копилку</div>`}
    </div>`;
    await pushLog("🎡 «"+s.nick+"» крутит колесо → "+(gotItem?("["+RARITY[rar].n+"] "+gotItem.n):("+"+shardGain+" осколков ["+RARITY[rar].n+"]")));
    wheelBusy=false; if(btn){btn.disabled=false;btn.style.opacity=1;}
    renderWheelInfo();
  },4500);
}

// Бесплатная крутка раба: сервер решает редкость (с pity и лимитом 1/день), клиент крутит и кладёт лут
async function freeSpin(){
  if(wheelBusy)return;
  const me=STATE.slaves.find(x=>x.id===STATE.slaveId);
  if(!me||STATE.slaveAuth!==me.id)return;
  wheelBusy=true;const btn=document.getElementById('wspin');if(btn){btn.disabled=true;btn.style.opacity=.5;}

  const {data,error}=await db.rpc('slave_free_spin',{p_id:me.id,p_pin:pin});
  if(error||!data||!data.ok){
    wheelBusy=false;if(btn){btn.disabled=false;btn.style.opacity=1;}
    const msg=data&&data.err==='done_today'?'Сегодня уже крутил — приходи завтра':data&&data.err==='low_rank'?'Нужен ранг от Pedigree Hound':data&&data.err==='bad_pin'?'Войди по PIN заново':'Не вышло крутить';
    toast(msg);return;
  }
  const rar=data.rarity;
  const cand=WHEEL_ORDER.map((r,i)=>r===rar?i:-1).filter(i=>i>=0);
  const idx=cand.length?cand[Math.floor(Math.random()*cand.length)]:0;
  const seg=360/WHEEL_ORDER.length;
  wheelAngle+=6*360+(360-idx*seg-seg/2);
  const svg=document.getElementById('wheelsvg');if(svg)svg.style.transform=`rotate(${wheelAngle}deg)`;
  setTimeout(async()=>{
    const owned=new Set(me.inventory||[]);
    const pool=GEAR.filter(g=>g.r===rar);const fresh=pool.filter(g=>!owned.has(g.id));
    let gotItem=null,shardGain=0,patch={};
    if(fresh.length){gotItem=fresh[Math.floor(Math.random()*fresh.length)];patch.inventory=[...(me.inventory||[]),gotItem.id];}
    else{shardGain=(rar==='legend'||rar==='mythic')?24:rar==='epic'?16:8;patch.shards=(me.shards||0)+shardGain;}
    // запись результата идёт обычным update (pity уже двинут на сервере)
    await db.from('slaves').update(patch).eq('id',me.id);
    const col=RARITY[rar].c,isHigh=(rar==='legend'||rar==='mythic');
    document.getElementById('wresult').innerHTML=`<div class="card corner" style="text-align:center;border-color:${col};animation:${isHigh?'glow 1.2s 3':'bloodGlow 1.5s'};margin-top:14px">
      <div class="muted">${isHigh?'★ РЕДЧАЙШИЙ ДРОП ★':'ВЫПАЛО'} · <span style="color:${col};font-weight:800">${RARITY[rar].n}</span></div>
      <div style="font-family:Cinzel;font-size:23px;font-weight:900;color:${col};margin-top:4px">${gotItem?esc(gotItem.n):'💎 +'+shardGain+' осколков'}</div></div>`;
    await pushLog("🎡 «"+me.nick+"» крутит бесплатное колесо → "+(gotItem?("["+RARITY[rar].n+"] "+gotItem.n):("+"+shardGain+" осколков")));
    wheelBusy=false;await fetchAll();
  },4500);
}

async function playFate(){
  if(!(STATE.slaveAuth&&STATE.slaveAuth===STATE.slaveId))return;
  const area=document.getElementById('fateArea');
  const res=document.getElementById('fateRes');
  const btn=event.target;
  btn.disabled=true;
  // анимация перемешивания
  const shuffle=['🂠','🃏','🂡','🃁','🃑'];
  let i=0;
  const anim=setInterval(()=>{area.textContent=shuffle[i++%shuffle.length];area.style.transform=`rotate(${(i%2?6:-6)}deg)`;},90);
  setTimeout(async ()=>{
    clearInterval(anim);
    area.style.transform='rotate(0deg)';
    try{
      const {data,error}=await db.rpc('slave_fate_draw',{p_id:STATE.slaveId,p_pin:mySlavePin()});
      if(error||(data&&data.ok===false)){
        const err=(data&&data.err)||'';
        area.textContent='🂠';
        if(err==='done_today'){res.innerHTML='<span style="color:#caa">🃏 Сегодня жребий уже брошен. Возвращайся завтра.</span>';}
        else{res.innerHTML='<span style="color:#caa">Не вышло. Попробуй позже.</span>';}
        btn.disabled=false;return;
      }
      // сервер решил исход — показываем его
      const icons={'БЛАГОСЛОВЕНИЕ':'👑','МИЛОСТЬ':'🕊','ДАР':'🎁','ИСПЫТАНИЕ':'⚖️','ПУСТОТА':'🌑','КАРА':'🔥'};
      area.textContent=icons[data.card]||'🂠';
      let msg=`<b style="color:#f0d98a;font-size:16px">${data.card}</b><br>`;
      if(data.kind==='op'&&data.amount>0)msg+=`Госпожа милостива: <b>+${data.amount} ОП</b>`;
      else if(data.kind==='op'&&data.amount<0)msg+=`Злой жребий: <b>${data.amount} ОП</b>`;
      else if(data.kind==='pain')msg+=`Тебе перепал дар: <b>+${data.amount} 🩸</b>`;
      else if(data.card==='ИСПЫТАНИЕ')msg+=`Госпожа испытывает тебя. Докажи преданность ритуалом.`;
      else msg+=`Судьба равнодушна сегодня.`;
      res.innerHTML=msg;
      await fetchAll();
    }catch(e){res.innerHTML='<span style="color:#caa">Ошибка связи.</span>';area.textContent='🂠';btn.disabled=false;}
  },1100);
}

async function playDice(){
  if(!(STATE.slaveAuth&&STATE.slaveAuth===STATE.slaveId))return;
  const d1=1+Math.floor(Math.random()*6),d2=1+Math.floor(Math.random()*6);
  const faces=["⚀","⚁","⚂","⚃","⚄","⚅"];
  document.getElementById('diceArea').textContent=faces[d1-1]+" "+faces[d2-1];
  let gain=d1+d2; let jackpot=false;
  if(d1===d2){gain*=3;jackpot=true;}
  const res=await callPlay('dice',30,gain);
  const el2=document.getElementById('diceRes');
  if(res&&res.ok){el2.innerHTML=`<span style="color:var(--gold);font-weight:800">${jackpot?'🎰 ДУБЛЬ! ':''}+${res.gain} Очков Боли</span>`;setTimeout(fetchAll,600);}
  else el2.innerHTML=`<span class="muted">${cdMsg(res)}</span>`;
}

async function playGuess(n){
  if(!(STATE.slaveAuth&&STATE.slaveAuth===STATE.slaveId))return;
  const secret=1+Math.floor(Math.random()*5);

  const res=await callPlay('guess',30,win?25:2);

  else el2.innerHTML=`<span class="muted">${cdMsg(res)}</span>`;
}

const SLOT_SYM=["🍒","🔔","🩸","💎","👑"];
let slotBusy=false;
async function playSlots(){
  if(slotBusy||!(STATE.slaveAuth&&STATE.slaveAuth===STATE.slaveId))return;
  slotBusy=true;
  const area=document.getElementById('slotArea');
  const fin=[0,1,2].map(()=>Math.floor(Math.random()*SLOT_SYM.length));
  // анимация прокрутки
  let ticks=0;const iv=setInterval(()=>{
    area.textContent=[0,1,2].map(()=>SLOT_SYM[Math.floor(Math.random()*SLOT_SYM.length)]).join(' ');
    if(++ticks>=14){clearInterval(iv);finishSlots(fin);}
  },70);
}
async function finishSlots(fin){
  const area=document.getElementById('slotArea');
  area.textContent=fin.map(i=>SLOT_SYM[i]).join(' ');
  // расчёт выигрыша
  const [a,b,c]=fin;let gain=2,label="мимо";
  if(a===b&&b===c){
    if(SLOT_SYM[a]==='👑'){gain=60;label="👑 ДЖЕКПОТ!";}
    else if(SLOT_SYM[a]==='💎'){gain=50;label="💎 Три алмаза!";}
    else{gain=40;label="Три в ряд!";}
  } else if(a===b||b===c||a===c){gain=12;label="Пара!";}
  const res=await callPlay('slots',30,gain);
  const el2=document.getElementById('slotRes');slotBusy=false;
  if(res&&res.ok){el2.innerHTML=`<span style="color:var(--gold);font-weight:800">${label} +${res.gain} Очков Боли</span>`;setTimeout(fetchAll,600);}
  else el2.innerHTML=`<span class="muted">${cdMsg(res)}</span>`;
}

function startQuiz(){const pool=[...QUIZ].sort(()=>Math.random()-0.5).slice(0,5);quizState={qs:pool,i:0,correct:0,done:false};render();}

async function answerQuiz(idx){
  const st=quizState;const q=st.qs[st.i];
  if(idx===q.a)st.correct++;
  st.i++;
  if(st.i>=st.qs.length){
    st.done=true;render();

    const res=await callPlay('quiz',120,gain);
    const el2=document.getElementById('quizRes');
    if(el2){if(res&&res.ok){el2.innerHTML=`<span style="color:var(--gold);font-weight:800">+${res.gain} Очков Боли</span>`;setTimeout(fetchAll,700);}else el2.innerHTML=`<span class="muted">${cdMsg(res)}</span>`;}
    setTimeout(()=>{quizState=null;},4000);
  } else render();
}

async function callPlay(game,cdMin,amount){

function setF(k,v){fight[k]=Number(v);fight.hpA=100;fight.hpB=100;fight.on=false;fight.over=null;fight.feed=[];fight.guardA=false;fight.guardB=false;fight.rageA=0;fight.rageB=0;fight.bleedA=0;fight.bleedB=0;render();}
function startFight(){fight.hpA=100;fight.hpB=100;fight.turn="A";fight.over=null;fight.feed=[];fight.guardA=false;fight.guardB=false;fight.rageA=0;fight.rageB=0;fight.bleedA=0;fight.bleedB=0;fight.on=true;render();}
// расчёт одного применения приёма: возвращает {dmg, heal, miss, crit, guard}
function applyMove(mv,att,def,defGuard){
  if(mv.kind==="guard")return {dmg:0,heal:0,miss:false,crit:false,guard:true};
  // ультимейт: не промахивается, игнорирует блок, вешает кровотечение.
  // множитель урезан (≤1.25), чтобы ульта была сильным финишером, а не гарантированным ваншотом
  if(mv.kind==="ult"){
    let base=Math.floor(Math.random()*(mv.dmg[1]-mv.dmg[0]+1))+mv.dmg[0];
    let ratio=Math.min(1.25, att.str/Math.max(8,def.def*0.7));
    let real=Math.round(base*ratio);
    return {dmg:Math.max(22,real),heal:0,miss:false,crit:true,guard:false,bleed:BLEED_TURNS};
  }
  // уклонение защищающегося — по скорости
  const dodge=Math.min(0.35, Math.max(0, (def.spd-att.spd)/300));
  if(Math.random()<dodge)return {dmg:0,heal:0,miss:true,crit:false,guard:false,dodged:true};
  if(Math.random()>mv.acc)return {dmg:0,heal:0,miss:true,crit:false,guard:false};
  const hits=mv.kind==="fast"?2:1;
  let total=0,crit=false;
  for(let h=0;h<hits;h++){
    let base=Math.floor(Math.random()*(mv.dmg[1]-mv.dmg[0]+1))+mv.dmg[0];
    let ratio=att.str/Math.max(8,def.def*0.7);
    if(mv.kind==="fast")ratio*=(1+att.spd/200); // быстрый бьёт по скорости
    const c=Math.random()<(0.10+att.spd/400);
    if(c)crit=true;
    let real=Math.round(base*ratio*(c?1.6:1));
    total+=Math.max(2,real);
  }
  if(defGuard)total=Math.round(total*0.5); // блок врага режет урон
  let heal=0;
  if(mv.kind==="drain")heal=Math.round(total*0.4);
  return {dmg:total,heal,miss:false,crit,guard:false};
}
// кровотечение в начале хода бойца. Возвращает true, если боец пал.
function tickBleed(side){
  const bk=side==='A'?'bleedA':'bleedB', hk=side==='A'?'hpA':'hpB';
  if((fight[bk]||0)<=0)return false;
  fight[hk]=Math.max(0,fight[hk]-BLEED_DMG);fight[bk]--;
  const s=STATE.slaves;const who=side==='A'?s.find(x=>x.id===fight.a):s.find(x=>x.id===fight.b);
  fight.feed.unshift("🩸 "+who.nick+" истекает кровью: −"+BLEED_DMG+" HP"+(fight[bk]>0?" (ещё "+fight[bk]+")":""));
  return fight[hk]<=0;
}
// начисление ярости после удара
function gainRage(attSide,dealt){
  const ak=attSide==='A'?'rageA':'rageB', dk=attSide==='A'?'rageB':'rageA';
  if(dealt>0){fight[ak]=Math.min(RAGE_MAX,(fight[ak]||0)+RAGE_HIT);fight[dk]=Math.min(RAGE_MAX,(fight[dk]||0)+RAGE_TAKE);}
}
// ход игрока (боец A) обычным приёмом
function useMove(i){
  if(!fight.on||fight.over||fight.turn!=="A")return;
  if(tickBleed('A')){render();return endFight("B");}
  const mv=MOVES[i];const s=STATE.slaves;
  const sa=s.find(x=>x.id===fight.a),sb=s.find(x=>x.id===fight.b);
  const pa=powerOf(sa),pb=powerOf(sb);
  const r=applyMove(mv,pa,pb,fight.guardB);
  fight.guardB=false; // блок врага израсходован
  if(r.guard){fight.guardA=true;fight.feed.unshift("🛡 "+sa.nick+": "+mv.name+" — готов отразить удар");}
  else if(r.miss){fight.feed.unshift("💨 "+sa.nick+": "+mv.name+(r.dodged?" — "+sb.nick+" уклонился!":" — мимо!"));}
  else{fight.hpB=Math.max(0,fight.hpB-r.dmg);if(r.heal)fight.hpA=Math.min(100,fight.hpA+r.heal);
    gainRage('A',r.dmg);
    fight.feed.unshift("⚔ "+sa.nick+": "+mv.name+" → "+r.dmg+(r.crit?" 💥КРИТ!":"")+(r.heal?" (+"+r.heal+" HP)":""));}
  if(fight.hpB<=0)return endFight("A");
  fight.turn="B";render();
  setTimeout(()=>aiTurn(),900);
}
// ультимейт игрока
function useUlt(){
  if(!fight.on||fight.over||fight.turn!=="A"||fight.rageA<RAGE_MAX)return;
  if(tickBleed('A')){render();return endFight("B");}
  const s=STATE.slaves;const sa=s.find(x=>x.id===fight.a),sb=s.find(x=>x.id===fight.b);
  const pa=powerOf(sa),pb=powerOf(sb);
  const r=applyMove(ULT,pa,pb,false);
  fight.rageA=0;fight.guardB=false;
  fight.hpB=Math.max(0,fight.hpB-r.dmg);fight.bleedB=Math.max(fight.bleedB||0,r.bleed||0);
  fight.feed.unshift("🔥💥 "+sa.nick+": ГНЕВ ГОСПОЖИ → "+r.dmg+" урона + кровотечение!");
  if(fight.hpB<=0)return endFight("A");
  fight.turn="B";render();
  setTimeout(()=>aiTurn(),900);
}
// ИИ соперника: юзает ульту при полной ярости, добивает, защищается на низком HP
function aiTurn(){
  if(!fight.on||fight.over)return;
  if(tickBleed('B')){render();return endFight("A");}
  const s=STATE.slaves;const sa=s.find(x=>x.id===fight.a),sb=s.find(x=>x.id===fight.b);
  const pa=powerOf(sa),pb=powerOf(sb);
  // ИИ: полная ярость → ультимейт
  if((fight.rageB||0)>=RAGE_MAX){
    const r=applyMove(ULT,pb,pa,false);
    fight.rageB=0;fight.guardA=false;
    fight.hpA=Math.max(0,fight.hpA-r.dmg);fight.bleedA=Math.max(fight.bleedA||0,r.bleed||0);
    fight.feed.unshift("🔥💥 "+sb.nick+": ГНЕВ ГОСПОЖИ → "+r.dmg+" урона + кровотечение!");
    if(fight.hpA<=0)return endFight("B");
    fight.turn="A";render();return;
  }
  let idx;
  const heavyIdx=MOVES.findIndex(m=>m.kind==="heavy");
  const guardIdx=MOVES.findIndex(m=>m.kind==="guard");
  const drainIdx=MOVES.findIndex(m=>m.kind==="drain");
  const normalIdx=MOVES.findIndex(m=>m.kind==="normal");
  if(fight.hpA<=28 && Math.random()<0.7)idx=heavyIdx;            // враг при смерти — добиваем тяжёлым
  else if(fight.hpB<=30 && Math.random()<0.5)idx=fight.hpB<22?drainIdx:guardIdx; // сами на грани — лечимся/блок
  else idx=[normalIdx,heavyIdx,drainIdx][Math.floor(Math.random()*3)];
  if(idx<0)idx=normalIdx;
  const mv=MOVES[idx];
  const r=applyMove(mv,pb,pa,fight.guardA);
  fight.guardA=false;
  if(r.guard){fight.guardB=true;fight.feed.unshift("🛡 "+sb.nick+": "+mv.name+" — встал в защиту");}
  else if(r.miss){fight.feed.unshift("💨 "+sb.nick+": "+mv.name+(r.dodged?" — "+sa.nick+" уклонился!":" — мимо!"));}
  else{fight.hpA=Math.max(0,fight.hpA-r.dmg);if(r.heal)fight.hpB=Math.min(100,fight.hpB+r.heal);
    gainRage('B',r.dmg);
    fight.feed.unshift("⚔ "+sb.nick+": "+mv.name+" → "+r.dmg+(r.crit?" 💥КРИТ!":"")+(r.heal?" (+"+r.heal+" HP)":""));}
  if(fight.hpA<=0)return endFight("B");
  fight.turn="A";render();
}
async function endFight(w){
  fight.over=w;fight.on=false;
  const s=STATE.slaves;
  const win=w==="A"?s.find(x=>x.id===fight.a):s.find(x=>x.id===fight.b);
  const los=w==="A"?s.find(x=>x.id===fight.b):s.find(x=>x.id===fight.a);
  render();
  // награды начисляет либо Госпожа, либо авторизованный раб-боец (если дрался своим персом)
  const canAward = STATE.isMistress || (STATE.slaveAuth && (STATE.slaveAuth===win.id || STATE.slaveAuth===los.id));
  if(!canAward)return;
  if(STATE.isMistress){
    await updateSlave(win.id,{op:win.op+15,wins:(win.wins||0)+1});
    await updateSlave(los.id,{op:Math.max(0,los.op-5),losses:(los.losses||0)+1});
    await giveXp(win.id,40);
    // Очки Боли победителю — и валюта, и слава
    await db.from('slaves').update({pain:(win.pain||0)+10}).eq('id',win.id);
    await pushLog("⚔️ Арена: «"+win.nick+"» сокрушил «"+los.nick+"» (+15 ОП, +10 ОБ, +40 опыта)");
  } else {
    // раб дрался сам — награду проводим через защищённый серверный вызов
    const pin=mySlavePin();
    await db.rpc('slave_arena_result',{p_win:win.id,p_los:los.id,p_pin:pin});
    await fetchAll();
  }
}

async function addSeasonOP(id,delta){
  if(!STATE.isMistress)return;
  const s=STATE.slaves.find(x=>x.id===id);
  const cur=s.season_op||0;
  const next=Math.max(0,Math.min(SEASON_MAX_TIER*SEASON_PER_TIER,cur+delta));
  const tBefore=seasonTier(cur),tAfter=seasonTier(next);
  await db.from('slaves').update({season_op:next}).eq('id',id);
  if(tAfter>tBefore){await pushLog("🎟 «"+s.nick+"» поднялся до тира "+tAfter+" сезонного пропуска!");}
  await fetchAll();
}
// выдача наград тира: переводит текст награды в реальный эффект (ОП/шмот/крутка/осколки)
async function claimSeasonTier(id,tier){
  if(!STATE.isMistress)return;
  const s=STATE.slaves.find(x=>x.id===id);
  if((s.season_claimed||[]).includes(tier)){toast("Уже выдано");return;}
  const rw=SEASON_REWARDS[tier];
  const patch={season_claimed:[...new Set([...(s.season_claimed||[]),tier])]};
  let op=s.op||0, log=[];
  // бесплатная дорожка
  const free=rw.free;
  if(/\+(\d+) ОП/.test(free)){op+=parseInt(free.match(/\+(\d+) ОП/)[1]);log.push(free);}
  else if(/Rare-шмот/.test(free)){const g=pickGearByRarity('rare',s);if(g){patch.inventory=[...new Set([...(s.inventory||[]),g.id])];log.push("Rare: "+g.n);}}
  else if(/Epic-шмот/.test(free)){const g=pickGearByRarity('epic',s);if(g){patch.inventory=[...new Set([...(s.inventory||[]),g.id])];log.push("Epic: "+g.n);}}
  else if(/Legendary-шмот/.test(free)){const g=pickGearByRarity('legend',s);if(g){patch.inventory=[...new Set([...(patch.inventory||s.inventory||[]),g.id])];log.push("Legendary: "+g.n);}}
  else if(/крутка колеса/.test(free)){patch.shards=(s.shards||0)+SPIN_SHARD_COST;log.push("осколки на крутку (+"+SPIN_SHARD_COST+")");}
  // дорожка Госпожи (косметика — фиксируем в лог, мифик-предмет на финале выдаём реально)
  const gold=rw.gold;
  if(/Mythic/.test(gold)){const g=pickGearByRarity('mythic',s);if(g){patch.inventory=[...new Set([...(patch.inventory||s.inventory||[]),g.id])];log.push("👑 Mythic: "+g.n);}else log.push("👑 "+gold);}
  else log.push("👑 "+gold);
  if(op!==s.op){patch.op=op;}
  await updateSlave(id,patch);
  await pushLog("🎟 «"+s.nick+"» забрал награды тира "+tier+": "+log.join(", "));
  toast("Награды тира "+tier+" выданы");
}
function pickGearByRarity(r,s){const owned=new Set(s.inventory||[]);const pool=GEAR.filter(g=>g.r===r&&!owned.has(g.id));return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;}

      <div style="color:#5a4a4c;font-size:10px;margin-top:14px">Слово Госпожи — закон. Но только для тех, кто пришёл по своей воле.</div>
    </div>
  </div>`;
}
function passAgeGate(){try{localStorage.setItem('podval_age_ok','1');}catch(e){}location.reload();}

(async function(){
  if(SUPABASE_URL.includes("VSTAV")){app.innerHTML='<div style="padding:30px;color:var(--dim)">Вставь ключи Supabase.</div>';return;}
  initTelegram();
  if(!ageGatePassed()){showAgeGate();return;}
  await checkSession();await tryTokenLogin();await fetchAll();
  // в Telegram: открыть перса того, кто зашёл (по tg_id). Действия — по PIN (безопасно).
  if(STATE.inTelegram && STATE.tgUserId && !STATE.slaveId && !STATE.isMistress){
    const me=STATE.slaves.find(s=>String(s.tg_id)===String(STATE.tgUserId));
    if(me){STATE.slaveId=me.id;STATE.tab="hero";render();}
    else{toast("Твой Telegram не привязан к персу — напиши боту /вход");}
  }
})();
</script>
